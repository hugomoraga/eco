events:
  # ============================================================
  # CRISIS (18 eventos)
  # ============================================================

  crisis_protest_001:
    title: "Protest in the industrial district"
    summary: "Workers take to the streets demanding changes."
    choices:
      - label: "Join the protest"
        effects: ["increase_unrest", "increase_anarchism"]
      - label: "Repress with security forces"
        effects: ["increase_technocracy", "lower_productivity"]
      - label: "Observe without intervening"
        effects: ["increase_ideological_drift"]

  crisis_protest_002:
    title: "Conflict in the central plaza"
    summary: "Tension escalates between rebels and law enforcement."
    choices:
      - label: "Escalate the conflict"
        effects: ["increase_unrest", "spawn_faction"]
      - label: "Negotiate a ceasefire"
        effects: ["increase_technocracy"]

  crisis_protest_003:
    title: "Occupation of administrative building"
    summary: "A group of citizens takes over government offices."
    choices:
      - label: "Let it escalate"
        effects: ["increase_anarchism", "increase_unrest"]
      - label: "Establish military control"
        effects: ["increase_surveillance", "increase_technocracy"]

  crisis_protest_004:
    title: "General strike declared"
    summary: "All production branches stop simultaneously."
    choices:
      - label: "Support the strike"
        effects: ["increase_unrest", "increase_anarchism"]
      - label: "Break the strike"
        effects: ["increase_technocracy", "lower_productivity"]

  crisis_protest_005:
    title: "Spontaneous demonstration"
    summary: "What started as a casual gathering becomes a protest."
    choices:
      - label: "Channel the energy"
        effects: ["increase_thelema", "spawn_faction"]
      - label: "Disperse the crowd"
        effects: ["increase_technocracy", "increase_surveillance"]

  crisis_protest_006:
    title: "Unrest in the tech district"
    summary: "Engineers question technocracy decisions."
    choices:
      - label: "Side with the engineers"
        effects: ["increase_anarchism", "spawn_faction"]
      - label: "Defend the technocrats"
        effects: ["increase_technocracy", "increase_surveillance"]

  crisis_shortage_001:
    title: "Food shortage"
    summary: "Basic supplies begin to run low in markets."
    choices:
      - label: "Ration resources"
        effects: ["lower_productivity", "increase_surveillance"]
      - label: "Let the market adjust"
        effects: ["increase_unrest", "increase_anarchism"]

  crisis_shortage_002:
    title: "Energy rationing"
    summary: "Energy consumption must be drastically reduced."
    choices:
      - label: "Implement centralized distribution"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Allow free barter"
        effects: ["increase_anarchism", "lower_productivity"]

  crisis_shortage_003:
    title: "Water crisis"
    summary: "Public aquifers have been depleted."
    choices:
      - label: "Create emergency reserves"
        effects: ["increase_technocracy", "lower_productivity"]
      - label: "Abandon the markets"
        effects: ["increase_absurdism", "increase_unrest"]

  crisis_shortage_004:
    title: "Medical supplies collapse"
    summary: "Hospitals lack sufficient medicine."
    choices:
      - label: "Centralize distribution"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Open black markets"
        effects: ["increase_anarchism", "spawn_faction"]

  crisis_breakdown_001:
    title: "Communications failure"
    summary: "The information network has stopped working."
    choices:
      - label: "Restart the system manually"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Let it collapse naturally"
        effects: ["increase_absurdism", "increase_anarchism"]

  crisis_breakdown_002:
    title: "Transport chaos"
    summary: "Mass mobility systems collapse."
    choices:
      - label: "Repair with internal resources"
        effects: ["lower_productivity", "increase_technocracy"]
      - label: "Seek external solutions"
        effects: ["increase_anarchism", "spawn_faction"]

  crisis_breakdown_003:
    title: "General blackout"
    summary: "The entire city goes dark."
    choices:
      - label: "Accept failure as destiny"
        effects: ["increase_absurdism", "increase_ideological_drift"]
      - label: "Force a complete restart"
        effects: ["increase_cult_risk", "increase_memory_decay"]

  crisis_breakdown_004:
    title: "Institutional collapse"
    summary: "Management systems can no longer operate."
    choices:
      - label: "Let it fall apart"
        effects: ["increase_anarchism", "increase_unrest"]
      - label: "Restore by force"
        effects: ["increase_technocracy", "increase_surveillance"]

  crisis_panic_001:
    title: "Financial panic"
    summary: "Inhabitants rush to exchange their currency."
    choices:
      - label: "Establish emergency committees"
        effects: ["increase_surveillance", "increase_technocracy"]
      - label: "Promote civil disobedience"
        effects: ["increase_anarchism", "increase_unrest"]

  crisis_panic_002:
    title: "Mass exodus"
    summary: "A wave of refugees abandons the city."
    choices:
      - label: "Create self-defense groups"
        effects: ["spawn_faction", "increase_anarchism"]
      - label: "Shelter in institutions"
        effects: ["increase_technocracy", "increase_surveillance"]

  crisis_panic_003:
    title: "Collective psychosis"
    summary: "Rumors trigger widespread fear."
    choices:
      - label: "Find meaning in chaos"
        effects: ["increase_thelema", "increase_cult_risk"]
      - label: "Ignore the warnings"
        effects: ["increase_absurdism", "increase_unrest"]

  crisis_panic_004:
    title: "Internal siege"
    summary: "Distrust among neighbors reaches maximum levels."
