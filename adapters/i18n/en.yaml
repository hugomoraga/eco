  crisis_energy_002:
    title: "Energy collapse"
    summary: "The electrical grid fails and the city loses power."
    choices:
      - label: "Prioritize critical services"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Let everything fail"
