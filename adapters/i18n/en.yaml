      - label: "Create internal surveillance"
        effects: ["increase_surveillance", "increase_technocracy"]
      - label: "Break social bonds"
        effects: ["increase_anarchism", "spawn_faction"]

  crisis_food_001:
    title: "Food shortage"
    summary: "Basic supplies begin to run low in markets."
    choices:
      - label: "Create community gardens"
        effects: ["increase_ecology", "lower_productivity"]
      - label: "Hoard supplies"
        effects: ["increase_surveillance", "increase_technocracy"]

  crisis_food_002:
    title: "Food rationing"
    summary: "A limited food distribution system has been implemented."
    choices:
      - label: "Distribute without control"
        effects: ["increase_anarchism", "increase_unrest"]
      - label: "Establish rationing"
        effects: ["increase_technocracy", "lower_productivity"]

  crisis_energy_001:
    title: "Energy crisis"
    summary: "Energy resources are running out and must be prioritized."
