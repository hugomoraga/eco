events:
  la_huelga_del_silencio:
    event_title: "The Strike of Silence"
    summary: "The workers stopped speaking for seven days."
    choices:
      - label: "Support the silence"
        effect_tags: ["increase_absurdism"]
      - label: "Turn it into a ritual"
        effect_tags: ["increase_thelema", "increase_cult_risk"]

  el_laboratorio_abierto:
    event_title: "The Open Laboratory"
    summary: "New horizontal coordination protocols were discovered."
    choices:
      - label: "Adopt the protocols"
        effect_tags: ["increase_technocracy"]
      - label: "Document without implementing"
        effect_tags: ["increase_memory"]

