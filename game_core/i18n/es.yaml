events:
  la_huelga_del_silencio:
    event_title: "La Huelga del Silencio"
    summary: "Los obreros dejaron de hablar durante siete dias."
    choices:
      - label: "Apoyar el silencio"
        effect_tags: ["increase_absurdism"]
      - label: "Convertirlo en ritual"
        effect_tags: ["increase_thelema", "increase_cult_risk"]

  el_laboratorio_abierto:
    event_title: "El Laboratorio Abierto"
    summary: "Se descubrieron nuevos protocolos de coordinacion horizontal."
    choices:
      - label: "Adoptar los protocolos"
        effect_tags: ["increase_technocracy"]
      - label: "Documentar sin implementar"
        effect_tags: ["increase_memory"]

