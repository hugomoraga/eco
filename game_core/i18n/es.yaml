events:
  # ============================================================
  # CRISIS (18 eventos)
  # ============================================================

  crisis_protest_001:
    title: "Manifestación en el distrito industrial"
    summary: "Los trabajadores salen a las calles exigiendo cambios."
    choices:
      - label: "Unirse a la manifestación"
        effects: ["increase_unrest", "increase_anarchism"]
      - label: "Reprimir con fuerzas de seguridad"
        effects: ["increase_technocracy", "lower_productivity"]
      - label: "Observar sin intervenir"
        effects: ["increase_ideological_drift"]

  crisis_protest_002:
    title: "Conflicto en la plaza central"
    summary: "La tensión escala entre rebeldes y fuerzas del orden."
    choices:
      - label: "Escalar el conflicto"
        effects: ["increase_unrest", "spawn_faction"]
      - label: "Negociar un alto el fuego"
        effects: ["increase_technocracy"]

  crisis_protest_003:
    title: "Ocupación del edificio administrativo"
    summary: "Un grupo de ciudadanos toma las oficinas del gobierno."
    choices:
      - label: "Permitir que escale"
        effects: ["increase_anarchism", "increase_unrest"]
      - label: "Establecer control militar"
        effects: ["increase_surveillance", "increase_technocracy"]

  crisis_shortage_001:
    title: "Escasez de alimentos"
    summary: "Los suministros básicos comienzan a escasear en los mercados."
    choices:
      - label: "Racionar recursos"
        effects: ["lower_productivity", "increase_surveillance"]
      - label: "Dejar que el mercado se ajuste"
        effects: ["increase_unrest", "increase_anarchism"]

  crisis_shortage_002:
    title: "Racionamiento de energía"
    summary: "El consumo de energia debe ser reducido drásticamente."
    choices:
      - label: "Implementar distribución centralizada"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Permitir trueque libre"
        effects: ["increase_anarchism", "lower_productivity"]

  crisis_shortage_003:
    title: "Crisis del agua"
    summary: "Los acuíferos públicos se han agotado."
    choices:
      - label: "Crear reservas de emergencia"
        effects: ["increase_technocracy", "lower_productivity"]
      - label: "Abandonar los mercados"
        effects: ["increase_absurdism", "increase_unrest"]

  crisis_breakdown_001:
    title: "Falla en las comunicaciones"
    summary: "La red de información ha dejado de funcionar."
    choices:
      - label: "Reiniciar el sistema manualmente"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Dejar que colapse naturalmente"
        effects: ["increase_absurdism", "increase_anarchism"]

  crisis_breakdown_002:
    title: "Caos en el transporte"
    summary: "Los sistemas de movilidad colectiva colapsan."
    choices:
      - label: "Reparar con recursos internos"
        effects: ["lower_productivity", "increase_technocracy"]
      - label: "Buscar soluciones externas"
        effects: ["increase_anarchism", "spawn_faction"]

  crisis_breakdown_003:
    title: "Apagón general"
    summary: "Toda la ciudad queda a oscuras."
    choices:
      - label: "Aceptar la falla como destino"
        effects: ["increase_absurdism", "increase_ideological_drift"]
      - label: "Forzar un reinicio completo"
        effects: ["increase_cult_risk", "increase_memory_decay"]

  crisis_panic_001:
    title: "Pánico financiero"
    summary: "Los habitantes corren a cambiar su moneda."
    choices:
      - label: "Establecer comités de emergencia"
        effects: ["increase_surveillance", "increase_technocracy"]
      - label: "Promover la desobediencia civil"
        effects: ["increase_anarchism", "increase_unrest"]

  crisis_panic_002:
    title: "Huida masiva"
    summary: "Una oleada de refugiados abandona la ciudad."
    choices:
      - label: "Crear grupos de autodefensa"
        effects: ["spawn_faction", "increase_anarchism"]
      - label: "Refugiarse en instituciones"
        effects: ["increase_technocracy", "increase_surveillance"]

  crisis_panic_003:
    title: "Psicosis colectiva"
    summary: "Rumores disparan el miedo general."
    choices:
      - label: "Buscar sentido en el caos"
        effects: ["increase_thelema", "increase_cult_risk"]
      - label: "Ignorar las advertencias"
        effects: ["increase_absurdism", "increase_unrest"]

  crisis_food_001:
    title: "Escasez de alimentos"
    summary: "Los suministros básicos comienzan a escasear en los mercados."
    choices:
      - label: "Crear huertos comunales"
        effects: ["increase_ecology", "lower_productivity"]
      - label: "Acumular suministros"
        effects: ["increase_surveillance", "increase_technocracy"]

  crisis_food_002:
    title: "Racionamiento alimentario"
    summary: "Se ha implementado un sistema de distribución limitada de alimentos."
    choices:
      - label: "Distribuir sin control"
        effects: ["increase_anarchism", "increase_unrest"]
      - label: "Establecer racionamiento"
        effects: ["increase_technocracy", "lower_productivity"]

  crisis_energy_001:
    title: "Crisis energética"
    summary: "Los recursos de energía se agotan y deben ser priorizados."
    choices:
      - label: "Reconectar la red manualmente"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Abandonar la red energética"
        effects: ["increase_ecology", "lower_productivity"]

  crisis_energy_002:
    title: "Colapso energético"
    summary: "La red eléctrica falla y la ciudad pierde potencia."
    choices:
      - label: "Priorizar servicios críticos"
        effects: ["increase_technocracy", "increase_surveillance"]
      - label: "Dejar que todo falle"
        effects: ["increase_absurdism", "spawn_faction"]

  crisis_infrastructure_001:
    title: "Infraestructura deteriorada"
    summary: "Los sistemas básicos de la ciudad muestran signos de falla."
    choices:
      - label: "Reparar inmediatamente"
        effects: ["lower_productivity", "increase_technocracy"]
      - label: "Reestructurar desde cero"
        effects: ["increase_anarchism", "increase_ideological_drift"]

  crisis_infrastructure_002:
    title: "Fallo en infraestructura"
    summary: "Los servicios esenciales presentan interrupciones frecuentes."
    choices:
      - label: "Aceptar el deterioro"
        effects: ["increase_absurdism", "increase_memory_decay"]
      - label: "Restaurar con métodos antiguos"
        effects: ["increase_ecology", "lower_productivity"]

  # ============================================================
  # RITUAL (17 eventos)
  # ============================================================

  ritual_gathering_001:
    title: "Convergencia de círculos"
    summary: "Los grupos secretos se reunen bajo la luna llena."
    choices:
      - label: "Organizar una reunión masiva"
        effects: ["increase_thelema", "increase_cult_risk"]
      - label: "Disolver la congregación"
        effects: ["increase_anarchism", "lower_productivity"]

  ritual_gathering_002:
    title: "Ceremonia de invocación"
    summary: "Una nueva entidad emerge de los ritos ancestrales."
    choices:
      - label: "Invitar a forasteros"
        effects: ["spawn_faction", "increase_ideological_drift"]
      - label: "Mantener la exclusividad"
        effects: ["increase_thelema", "increase_cult_risk"]

  ritual_gathering_003:
    title: "Festival de las máscaras"
    summary: "Todos portan rostros ocultos en esta celebración."
    choices:
      - label: "Permitir caos ritual"
        effects: ["increase_absurdism", "increase_cult_risk"]
