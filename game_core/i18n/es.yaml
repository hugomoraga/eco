        effects: ["increase_cult_risk", "increase_memory_decay"]
      - label: "Abierto a todos"
        effects: ["increase_absurdism", "increase_anarchism"]

  ritual_initiation_003:
    title: "Juramento de sangre"
    summary: "Un pacto indeleble sellará la pertenencia."
    choices:
      - label: "Legar conocimiento oral"
        effects: ["increase_thelema", "increase_memory_decay"]
      - label: "Escribir secretos"
