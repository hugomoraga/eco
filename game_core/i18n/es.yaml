  ritual_transgression_003:
    title: "Inversión de rituales"
    summary: "Los símbolos tradicionales se han invertido."
    choices:
      - label: "Reinterpretar las reglas"
        effects: ["increase_ideological_drift", "increase_thelema"]
      - label: "Eliminar las reglas"
