  ritual_sacrifice_002:
    title: "Dones de voluntad"
    summary: "Los participantes entregan parte de su esencia."
    choices:
      - label: "Sacrificar objetos simbólicos"
        effects: ["increase_thelema", "increase_cult_risk"]
      - label: "Sacrificar tiempo de trabajo"
        effects: ["lower_productivity", "increase_ideological_drift"]

  ritual_sacrifice_003:
    title: "Cisión ritual"
    summary: "Un fragmento del grupo se separa."
