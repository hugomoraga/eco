# Single source of truth for all archetype definitions
# This file contains all archetype-specific data used across the system

archetypes:
  artisan:
    display_name: "Artesano"
    description: "Constructor, maker, creador con sus manos"
    intro_texts:
      - "Eres la voz de los artesanos, los makers, los que construyen con sus manos."
      - "Tu esencia es el trabajo. La creación es tu protesta."
      - "Los herreros, los tejedores, los constructores... todos tejen el futuro."
    color: "cyan"

    # Goal generation weights
    goal_weights:
      accumulate: 0.4
      progress: 0.4
      survive: 0.2
      maintain: 0.0

    # Preferred actions (in order of preference)
    action_preferences:
      - organizar
      - reclutar
      - conversar
      - negociar
      - propagar

    # Base stats for NPCs of this archetype
    base_stats:
      loyalty: 55
      influence: 10
      vitality: 100

  merchant:
    display_name: "Mercader"
    description: "Comerciante, negociador, acumulador"
    intro_texts:
      - "De las transacciones surge el poder. Tu riqueza es tu arma."
      - "El comercio mueve ciudades. Y tú mueves el comercio."
      - "Tu moneda habla más fuerte que las balas."
    color: "yellow"

    goal_weights:
      accumulate: 0.6
      maintain: 0.3
      survive: 0.1
      progress: 0.0

    action_preferences:
      - negociar
      - propagar
      - conversar
      - reclutar
      - organizar

    base_stats:
      loyalty: 50
      influence: 15
      vitality: 100

  warrior:
