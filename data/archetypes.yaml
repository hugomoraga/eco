    description: "Luchador, defensor, protector"
    intro_texts:
      - "La fuerza bruta abre caminos que la palabra no puede."
      - "Tu puño es tu argumento. La acción tu discurso."
      - "Los músculos mueven montañas. Y tú eres la montaña."
    color: "red"

    goal_weights:
      maintain: 0.5
      progress: 0.4
      survive: 0.1
      accumulate: 0.0

